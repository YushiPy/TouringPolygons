<!DOCTYPE html>
<html lang="pt-br">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

	<link href="{{ static }}/css/base.css" rel="stylesheet">

	<script src="{{ static }}/js/base.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.js"
		integrity="sha384-ezjq8118wdwdRMj+nX4bevEi+cDLTbhLAeFF688VK8tPDGeLUe0WoY2MZtSla72F"
		crossorigin="anonymous">
	</script>

	<!-- polygon-clipping is used by convex-partition.js, so we need to load it before. -->
	<script src="https://cdn.jsdelivr.net/npm/polygon-clipping@0.15.7/dist/polygon-clipping.umd.js"></script>

	<link rel="icon" type="image/svg+xml" href="{{ static }}/img/favicon.svg">
	<link rel="icon" type="image/png" href="{{ static }}/img/favicon.png" sizes="32x32">

	{% block head_extra %}{% endblock %}

</head>

<body>
	{% block content %}{% endblock %}
</body>

</html>
