<link rel="stylesheet" href="{{ static }}/css/saved_drawings.css">

<div class="drawings-overlay">
	<div class="drawings-panel">
		<div class="drawings-header">
			<span>Saved Drawings</span>
			<button id="new-drawing-button" onclick="newDrawing();">New Drawing</button>
		</div>

		<input id="drawings-search" type="text" placeholder="Search drawings..." oninput="filterDrawings(this.value)">

		<div class="drawings-grid">
			{% for drawing in drawings %}
			<div class="drawing-card" data-id="{{ drawing.id }}" onclick="loadDrawing({{ drawing.id }})">
				<div class="drawing-thumbnail">
					<img src="{{ drawing.dataURL }}" alt="{{ drawing.drawing_name }}">
				</div>
				<div class="drawing-info">
					<span class="drawing-title">{{ drawing.drawing_name }}</span>
					<span class="drawing-date" data-date="{{ drawing.modified_at }}Z"></span>
				</div>
				<button class="drawing-delete" onclick="deleteDrawing(event, {{ drawing.id }})">
					<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
						stroke-linecap="round" stroke-linejoin="round">
						<polyline points="3 6 5 6 21 6"></polyline>
						<path d="M19 6l-1 14H6L5 6"></path>
						<path d="M10 11v6M14 11v6"></path>
						<path d="M9 6V4h6v2"></path>
					</svg>
				</button>
			</div>
			{% endfor %}

			{% if not drawings %}
			<p class="no-drawings">No saved drawings yet.</p>
			{% endif %}
		</div>
	</div>

</div>
<div id="delete-modal"
	style="display:none; position:fixed; inset:0; z-index:1000; align-items:center; justify-content:center; background:rgba(0,0,0,0.5);">
	<div
		style="background:var(--header-color); border-radius:12px; padding:24px 28px; max-width:320px; width:90%; border:0.5px solid rgba(255,255,255,0.1);">
		<p
			style="font-size:15px; color:var(--text-highlight-color); margin:0 0 6px; font-weight:500; font-family:var(--font-family);">
			Delete drawing?</p>
		<p style="font-size:13px; color:var(--text-color); margin:0 0 20px; font-family:var(--font-family);">This cannot
			be undone.</p>
		<div style="display:flex; gap:8px; justify-content:flex-end;">
			<button id="delete-cancel"
				style="padding:7px 16px; border-radius:7px; border:0.5px solid rgba(255,255,255,0.15); background:transparent; color:var(--text-color); font-size:13px; font-family:var(--font-family); cursor:pointer;">Cancel</button>
			<button id="delete-confirm"
				style="padding:7px 16px; border-radius:7px; border:none; background:var(--accent-color); color:#fff; font-size:13px; font-family:var(--font-family); cursor:pointer;">Delete</button>
		</div>
	</div>
</div>

<script>

	document.addEventListener('click', function (event) {
		const drawingsOverlay = document.querySelector('.drawings-overlay');
		const drawingsBox = document.querySelector('.drawings-panel');

		if (drawingsOverlay && !drawingsBox.contains(event.target)) {
			document.getElementById('saved-drawings-overlay').innerHTML = '';
		}
	});

	document.querySelectorAll(".drawing-date").forEach(el => {
		el.textContent = timeAgo(el.dataset.date);
	});

	function timeAgo(dateStr) {
		const seconds = Math.floor((new Date() - new Date(dateStr)) / 1000);

		const intervals = [
			[31536000, "year"],
			[2592000, "month"],
			[604800, "week"],
			[86400, "day"],
			[3600, "hour"],
			[60, "minute"],
			[1, "second"],
		];

		for (const [secs, label] of intervals) {
			const count = Math.floor(seconds / secs);
			if (count >= 1) return `${count} ${label}${count !== 1 ? "s" : ""} ago`;
		}

		return "just now";
	}

	function loadDrawing(drawingId) {
		fetch(`/drawings/${drawingId}`)
			.then(response => response.json())
			.then(data => {

				const scene = window.scene;
				scene.loadFromData(data);
				document.getElementById('saved-drawings-overlay').innerHTML = '';

				setSavedDrawing(drawingId, data.drawingName);
			})
			.catch(error => {
				console.error("Error loading drawing:", error);
				alert("An error occurred while loading the drawing.");
			});
	}

	function filterDrawings(query) {
		const q = query.toLowerCase();
		document.querySelectorAll(".drawing-card").forEach(card => {
			const title = card.querySelector(".drawing-title").textContent.toLowerCase();
			card.style.display = title.includes(q) ? "" : "none";
		});

		const visible = document.querySelectorAll(".drawing-card:not([style*='display: none'])").length;
		const noDrawings = document.querySelector(".no-drawings");
		if (noDrawings) noDrawings.style.display = visible === 0 ? "" : "none";
	}

	function newDrawing() {

		const scene = window.scene;
		scene.clear();

		document.getElementById('saved-drawings-overlay').innerHTML = '';

		setSavedDrawing(null, null);
	}

	function deleteDrawing(event, drawingId) {
		event.stopPropagation();

		const modal = document.getElementById('delete-modal');
		modal.style.display = 'flex';

		const cancel = document.getElementById('delete-cancel');
		const confirm = document.getElementById('delete-confirm');

		function cleanup() {
			modal.style.display = 'none';
			cancel.replaceWith(cancel.cloneNode(true));
			confirm.replaceWith(confirm.cloneNode(true));
		}

		document.getElementById('delete-cancel').addEventListener('click', cleanup);

		document.getElementById('delete-confirm').addEventListener('click', e => {
			e.stopPropagation();
			cleanup();

			fetch(`/drawings/${drawingId}`, { method: "DELETE" })
				.then(response => {
					if (!response.ok) throw new Error();
					const card = document.querySelector(`.drawing-card[data-id="${drawingId}"]`);
					if (card) card.remove();

					const remaining = document.querySelectorAll(".drawing-card").length;
					const noDrawings = document.querySelector(".no-drawings");
					if (noDrawings) noDrawings.style.display = remaining === 0 ? "" : "none";
				})
				.catch(() => alert("An error occurred while deleting the drawing."));
		});

		modal.addEventListener('click', e => {
			if (e.target === modal) cleanup();
		}, { once: true });

	}
</script>
