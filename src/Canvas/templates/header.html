<div class="header-right">
	<div id="response"></div>
	<div id="user-login-section" data-logged-in="{{ 'true' if username else 'false' }}">

		<div class="logged-in-section">
			<div class="username-dropdown">
				<button class="username-button mix-bg">
					{{ username }}
					<svg class="down-arrow-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
						<path fill-rule="evenodd" clip-rule="evenodd"
							d="M4.29289 8.29289C4.68342 7.90237 5.31658 7.90237 5.70711 8.29289L12 14.5858L18.2929 8.29289C18.6834 7.90237 19.3166 7.90237 19.7071 8.29289C20.0976 8.68342 20.0976 9.31658 19.7071 9.70711L12.7071 16.7071C12.3166 17.0976 11.6834 17.0976 11.2929 16.7071L4.29289 9.70711C3.90237 9.31658 3.90237 8.68342 4.29289 8.29289Z" />
					</svg>
				</button>
				<div id="dropdown-content" class="dropdown-content dropdown">
					<div class="dropdown-items">
						<button class="dropdown-button mix-bg darken-mixing">
							Profile Settings
						</button>
						<button class="dropdown-button mix-bg darken-mixing" hx-post="/logout" hx-target="#dummy">
							Log Out
						</button>
						<div id="dummy" class="dummy"></div>
					</div>
				</div>
			</div>
		</div>
		<div class="not-logged-in-section">
			<button class="login-button" hx-get="/login" hx-target="#user-login-section-outer" hx-swap="innerHTML">
				Login
			</button>
			<button class="signup-button mix-bg" hx-get="/signup" hx-target="#user-login-section-outer"
				hx-swap="innerHTML">
				Sign Up
			</button>
		</div>
	</div>
</div>

<script>

	function toggleDropdown(obj, show) {

		if (show) {
			obj.style.opacity = "1";
			obj.style.pointerEvents = "auto";
		} else {
			obj.style.opacity = "0";
			obj.style.pointerEvents = "none";
		}
	}

	const buttonMenuMapping = {
		".username-button": "#dropdown-content",
		".save-options-button": "#save-dropdown-menu"
	};

	for (const [buttonSelector, dropdownSelector] of Object.entries(buttonMenuMapping)) {

		const button = document.querySelector(buttonSelector);
		const dropdown = document.querySelector(dropdownSelector);

		if (!button || !dropdown) continue;

		toggleDropdown(dropdown, false);

		button.addEventListener("click", function (event) {
			event.stopPropagation();
			toggleDropdown(dropdown, dropdown.style.opacity === "0");
		});

		document.body.addEventListener("click", function () {
			toggleDropdown(dropdown, false);
		});
	}

	async function onSaveClick() {

		if (drawingName) {

			const scene = window.scene;
			const id = drawingId;

			await scene.updateDrawingData(id, drawingName);

		} else {
			toggleOverlay("save-prompt", true);
		}
	}

	function setLoggedIn(loggedIn) {

		document.querySelector(".logged-in-section").style.display = loggedIn ? "" : "none";
		document.querySelector(".not-logged-in-section").style.display = loggedIn ? "none" : "";

		const button = document.querySelector(".save-options-button");

		if (button) {

			button.style.display = loggedIn ? "" : "none";

			const saveDrawingButton = document.querySelector("#save-drawing-button");

			if (saveDrawingButton) {
				saveDrawingButton.style.borderTopRightRadius = loggedIn ? "0" : "5px";
				saveDrawingButton.style.borderBottomRightRadius = loggedIn ? "0" : "5px";
			}
		}

		const saveDrawingButton = document.querySelector("#save-drawing-button");
		const section = document.getElementById("user-login-section");

		saveDrawingButton.onclick = null;
		saveDrawingButton.removeAttribute("hx-get");
		saveDrawingButton.removeAttribute("hx-target");
		saveDrawingButton.removeAttribute("hx-swap");

		if (loggedIn) {
			saveDrawingButton.onclick = onSaveClick;

		} else {
			saveDrawingButton.setAttribute("hx-get", "/login");
			saveDrawingButton.setAttribute("hx-target", "#user-login-section-outer");
			saveDrawingButton.setAttribute("hx-swap", "innerHTML");
		}

		htmx.process(saveDrawingButton);
	}

	const section = document.getElementById("user-login-section");
	setLoggedIn(section.dataset.loggedIn === "true");

	if (section.dataset.loggedIn === "true") {
		const usernameText = section.querySelector(".username-button");
		// username is already rendered by Jinja, no need to update it
	}

	document.body.addEventListener("loginSuccess", (e) => {
		document.querySelector(".username-button").firstChild.textContent = e.detail.username + " ";
		setLoggedIn(true);
	});

	document.body.addEventListener("logoutSuccess", () => setLoggedIn(false));

	setSavedDrawing(null, null);

	function openTPPinfo() {

		const anchor = document.createElement("a");
		anchor.href = "/tpp-info";
		anchor.target = "_blank";
		anchor.click();
	}

</script>
